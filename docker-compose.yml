services:
  postgres:
    image: postgres:17

    container_name: postgres-etl

    restart: always

    environment:
      POSTGRES_DB: etl_vendas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d etl_vendas"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .

    container_name: pipeline-etl

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env.docker

    command: python src/main.py

volumes:
  postgres_data: